---
- name: Update and Upgrade Packages
  block:
    - name: Update apt repo and cache (Debian/Ubuntu)
      ansible.builtin.apt:
        update_cache: yes
        force_apt_get: yes
        cache_valid_time: 3600
        upgrade: dist
      when: ansible_os_family == 'Debian'

    - name: Update packages (CentOS/RedHat)
      ansible.builtin.dnf:
        name: "*"
        state: latest
      when: ansible_os_family == 'RedHat'

    - name: Update packages (Alpine)
      community.general.apk:
        update_cache: yes
        upgrade: yes
      when: ansible_os_family == 'Alpine'
  become: yes

- name: Update Docker Compose applications
  block:
    - name: Check for docker-compose.yml in /srv
      ansible.builtin.stat:
        path: /srv/docker-compose.yml
      register: docker_compose_file

    - name: Pull and restart Docker Compose services
      block:
        - name: Pull latest images
          ansible.builtin.command:
            cmd: "docker compose pull"
            chdir: /srv
          changed_when: true

        - name: Restart services
          ansible.builtin.command:
            cmd: "docker compose restart"
            chdir: /srv
          changed_when: true
      when: docker_compose_file.stat.exists
  become: yes

- name: Check if Reboot is Required
  block:
    - name: Get system uptime in seconds
      ansible.builtin.shell: cat /proc/uptime | awk '{print $1}'
      register: uptime_seconds
      changed_when: false

    - name: Check if a reboot is needed (Debian/Ubuntu/Alpine)
      ansible.builtin.stat:
        path: "{{ item }}"
      register: reboot_required_file
      loop:
        - /var/run/reboot-required
        - /run/reboot-required
      when: ansible_os_family in ['Debian', 'Alpine']

    - name: Check if a reboot is needed (CentOS/RedHat)
      ansible.builtin.shell:
        cmd: "needs-restarting -r"
      check_mode: false
      register: reboot_required_cmd
      failed_when: false
      changed_when: false
      when: ansible_os_family == 'RedHat'
  become: yes

- name: Reboot if Required
  ansible.builtin.reboot:
    msg: "Reboot initiated by Ansible (Reason: {{ reboot_reason }})"
    connect_timeout: 5
    reboot_timeout: 300
    pre_reboot_delay: 0
    post_reboot_delay: 30
    test_command: uptime
  vars:
    is_long_uptime: "{{ (uptime_seconds.stdout | default(0) | float) > (30 * 86400) }}"
    is_not_proxmox: "{{ 'proxmox_server' not in (tags | default([])) }}"
    reboot_required_by_pkg: >
      (reboot_required_file is defined and reboot_required_file.results is defined and
       reboot_required_file.results | selectattr('stat.exists', 'defined') | selectattr('stat.exists', 'equalto', true) | list | length > 0) or
      (reboot_required_cmd is defined and reboot_required_cmd.rc | default(0) == 1)
    reboot_reason: >
      {% if reboot_required_by_pkg and is_long_uptime and is_not_proxmox %}System updates and uptime > 30 days
      {% elif reboot_required_by_pkg %}System updates
      {% elif is_long_uptime and is_not_proxmox %}Uptime > 30 days
      {% else %}Maintenance
      {% endif %}
  when: (reboot_required_by_pkg | bool) or (is_long_uptime | bool and is_not_proxmox | bool)
  become: yes
